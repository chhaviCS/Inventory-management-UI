<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>Add New Product</h2>
            <a href="/products-page" class="add-btn" style="background-color: var(--text-muted);">View Inventory</a>
        </header>

        <div class="form-container">
            <form id="form">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" placeholder="Enter product name" required>
                </div>
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" placeholder="0.00" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label for="image">Image URL</label>
                    <input type="text" id="image" placeholder="https://example.com/image.jpg">
                </div>
                <button type="submit" class="btn-submit">Add Product</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
