<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Add Product</h2>

<a href="/products-page">View Products</a>

<form id="form">

</form>

<script src="app.js"></script>
</body>
</html>
